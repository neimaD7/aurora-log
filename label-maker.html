<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Label Maker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000000;
  color: #e5e5e7;
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  padding: 16px;
  -webkit-text-size-adjust: 100%;
}
h1 {
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  text-align: center;
  margin-bottom: 20px;
  font-weight: 600;
}
.label-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}
.field-label {
  font-size: 0.62rem;
  text-transform: uppercase;
  color: #555555;
  letter-spacing: 0.12em;
  margin-bottom: 6px;
  font-family: 'Courier New', Courier, monospace;
}
.field-label.second { margin-top: 12px; }
input[type="text"] {
  width: 100%;
  background: #000000;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: #e5e5e7;
  font-family: 'Courier New', Courier, monospace;
  font-size: 1rem;
  padding: 10px 12px;
  outline: none;
}
input[type="text"]:focus {
  border-color: rgba(255,255,255,0.2);
}
input[type="text"]::placeholder {
  color: #333;
}
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.btn {
  font-family: 'Courier New', Courier, monospace;
  letter-spacing: 0.06em;
  border: none;
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 0.8rem;
  cursor: pointer;
  font-weight: 600;
  touch-action: manipulation;
}
.btn-dup {
  background: rgba(255,255,255,0.06);
  color: #e5e5e7;
}
.btn-del {
  background: rgba(255,60,60,0.12);
  color: #ff6b6b;
}
.btn-add {
  width: 100%;
  background: rgba(255,255,255,0.06);
  color: #e5e5e7;
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 14px;
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.9rem;
  letter-spacing: 0.06em;
  cursor: pointer;
  font-weight: 600;
  margin-bottom: 12px;
  touch-action: manipulation;
}
.btn-print {
  width: 100%;
  background: #ffffff;
  color: #000000;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-family: 'Courier New', Courier, monospace;
  font-size: 1rem;
  letter-spacing: 0.06em;
  cursor: pointer;
  font-weight: 700;
  touch-action: manipulation;
}
.btn-print:active { background: #cccccc; }
.btn-dup:active, .btn-add:active { background: rgba(255,255,255,0.12); }
</style>
</head>
<body>

<h1>LABEL MAKER</h1>
<div id="labels-container"></div>
<button class="btn-add" onclick="addLabel()">+ ADD LABEL</button>
<button class="btn-print" onclick="printLabels()">PRINT</button>

<script>
var labels = [{ name: '', overstock: '' }];

function render() {
  var c = document.getElementById('labels-container');
  c.innerHTML = '';
  for (var i = 0; i < labels.length; i++) {
    var card = document.createElement('div');
    card.className = 'label-card';
    card.innerHTML =
      '<div class="field-label">ITEM NAME</div>' +
      '<input type="text" placeholder="Enter item name" value="' + esc(labels[i].name) + '" data-idx="' + i + '" data-field="name">' +
      '<div class="field-label second">OVERSTOCK LOCATION</div>' +
      '<input type="text" placeholder="Optional" value="' + esc(labels[i].overstock) + '" data-idx="' + i + '" data-field="overstock">' +
      '<div class="card-actions">' +
        '<button class="btn btn-dup" onclick="dupLabel(' + i + ')">DUP</button>' +
        (labels.length > 1 ? '<button class="btn btn-del" onclick="delLabel(' + i + ')">DEL</button>' : '') +
      '</div>';
    c.appendChild(card);
  }
  // attach input listeners
  var inputs = c.querySelectorAll('input[type="text"]');
  for (var j = 0; j < inputs.length; j++) {
    inputs[j].addEventListener('input', onInput);
  }
}

function onInput(e) {
  var idx = parseInt(e.target.getAttribute('data-idx'));
  var field = e.target.getAttribute('data-field');
  labels[idx][field] = e.target.value;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addLabel() {
  labels.push({ name: '', overstock: '' });
  render();
}

function dupLabel(i) {
  labels.splice(i + 1, 0, { name: labels[i].name, overstock: labels[i].overstock });
  render();
}

function delLabel(i) {
  if (labels.length > 1) {
    labels.splice(i, 1);
    render();
  }
}

function printLabels() {
  // filter out empty labels
  var toprint = [];
  for (var i = 0; i < labels.length; i++) {
    if (labels[i].name.trim() !== '') toprint.push(labels[i]);
  }
  if (toprint.length === 0) { alert('No labels to print. Enter at least one item name.'); return; }

  // build label HTML (NO inline script)
  var labelHtml = '';
  for (var i = 0; i < toprint.length; i++) {
    var osHtml = '';
    if (toprint[i].overstock.trim() !== '') {
      osHtml = '<div class="overstock">Overstock in ' + esc(toprint[i].overstock) + '</div>';
    }
    labelHtml +=
      '<div class="label">' +
        '<div class="item-name">' + esc(toprint[i].name) + '</div>' +
        osHtml +
      '</div>';
  }

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Print Labels</title>' +
    '<style>' +
    '@page { size: 8.5in 11in; margin: 0.25in; }' +
    '*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }' +
    'body { font-family: "Courier New", Courier, monospace; background: #fff; }' +
    '.label { width: 5.75in; height: 1.75in; border: 1px dashed #cccccc; padding: 0.15in 0.25in; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; page-break-inside: avoid; break-inside: avoid; overflow: hidden; }' +
    '.item-name { font-weight: bold; color: #000; white-space: nowrap; font-size: 96pt; line-height: 1.1; }' +
    '.overstock { font-weight: bold; color: #000; white-space: nowrap; line-height: 1.2; margin-top: 2px; }' +
    '</style></head><body>' + labelHtml + '</body></html>';

  var win = window.open('', '_blank');
  if (!win) { alert('Pop-up blocked. Please allow pop-ups for this page.'); return; }
  win.document.open();
  win.document.write(html);
  win.document.close();

  // Parent window runs sizing on child DOM after layout computes
  function runSizing() {
    try {
      var doc = win.document;
      var allLabels = doc.querySelectorAll('.label');
      for (var j = 0; j < allLabels.length; j++) {
        var label = allLabels[j];
        var nameEl = label.querySelector('.item-name');
        var osEl = label.querySelector('.overstock');
        var cw = label.clientWidth;
        var maxW = (cw > 0) ? cw - 36 : 504;
        var size = 96;
        nameEl.style.fontSize = size + 'pt';
        while (nameEl.scrollWidth > maxW && size > 8) {
          size--;
          nameEl.style.fontSize = size + 'pt';
        }
        if (osEl) {
          var osSize = Math.max(Math.round(size * 0.55), 14);
          osEl.style.fontSize = osSize + 'pt';
          while (osEl.scrollWidth > maxW && osSize > 8) {
            osSize--;
            osEl.style.fontSize = osSize + 'pt';
          }
        }
      }
      return true;
    } catch(e) {
      return false;
    }
  }

  // Wait for child window layout, then size, then print
  var attempts = 0;
  var sizeInterval = setInterval(function() {
    attempts++;
    try {
      // check if document is ready and has layout
      var testLabel = win.document.querySelector('.label');
      if (testLabel && (testLabel.clientWidth > 0 || attempts > 20)) {
        clearInterval(sizeInterval);
        runSizing();
        setTimeout(function() { win.print(); }, 100);
      }
    } catch(e) {
      // cross-origin or closed
      clearInterval(sizeInterval);
    }
    if (attempts > 40) {
      clearInterval(sizeInterval);
      runSizing(); // fallback with 504px
      setTimeout(function() { win.print(); }, 100);
    }
  }, 100);
}

// initial render
render();
</script>
</body>
</html>
