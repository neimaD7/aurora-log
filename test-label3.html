<!DOCTYPE html><html><head><style>
@page { size: 8.5in 11in; margin: 0.25in; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Courier New",monospace; }
.label { width: 5.75in; height: 1.75in; border: 1px dashed #cccccc; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; position: relative; }
.item-name { font-weight: 700; line-height: 1.05; color: #000000; white-space: nowrap; }
.old { padding: 0.15in 0.25in; }
.new { padding: 0.05in 0.08in; }
h3 { margin-top: 10px; }
</style></head><body>
<h3>OLD padding (0.15in 0.25in) = 0.5in eaten</h3>
<div class="label old">
  <div class="item-name" id="t1">24" Pine Stakes</div>
</div>

<h3>NEW padding (0.05in 0.08in) = 0.16in eaten</h3>
<div class="label new">
  <div class="item-name" id="t2">24" Pine Stakes</div>
</div>

<h3>Short text - OLD</h3>
<div class="label old">
  <div class="item-name" id="t3">Rebar</div>
</div>

<h3>Short text - NEW</h3>
<div class="label new">
  <div class="item-name" id="t4">Rebar</div>
</div>

<pre id="debug"></pre>
<script>
var cvs = document.createElement("canvas");
var ctx = cvs.getContext("2d");

var tests = [
  {id: "t1", text: '24" Pine Stakes', cls: "old"},
  {id: "t2", text: '24" Pine Stakes', cls: "new"},
  {id: "t3", text: 'Rebar', cls: "old"},
  {id: "t4", text: 'Rebar', cls: "new"}
];
var info = "";

tests.forEach(function(t) {
  var label = document.getElementById(t.id).parentElement;
  var cs = getComputedStyle(label);
  var maxW = label.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  var maxH = label.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);

  var lo = 8, hi = 300, best = 8;
  while (lo <= hi) {
    var mid = Math.floor((lo + hi) / 2);
    ctx.font = '700 ' + mid + 'pt "Courier New",monospace';
    var fits = ctx.measureText(t.text).width <= maxW && mid * 1.35 <= maxH;
    if (fits) { best = mid; lo = mid + 1; } else { hi = mid - 1; }
  }
  document.getElementById(t.id).style.fontSize = best + "pt";
  info += t.id + " (" + t.cls + ") '" + t.text + "': " + best + "pt | usable: " + Math.round(maxW) + "x" + Math.round(maxH) + "px\n";
});

document.getElementById("debug").textContent = info;
</script>
</body></html>
