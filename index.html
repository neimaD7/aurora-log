<body>
<div id="root"></div>
<script>
/* ====== FAILSAFE SYSTEM ====== */
["aurora_log_entries", "aurora_log_known_items", "aurora_log_upcoming"].forEach(function(k) {
  try { var v = localStorage.getItem(k); if (v !== null) JSON.parse(v); }
  catch(e) {
    try { localStorage.setItem(k + "_corrupted_backup", localStorage.getItem(k)); } catch(x) {}
    localStorage.removeItem(k);
  }
});
window.storage = {
  async get(k) { var v = localStorage.getItem("aurora_log_" + k); if (v === null) throw new Error("Not found"); return { key: k, value: v }; },
  async set(k, v) { localStorage.setItem("aurora_log_" + k, v); try { localStorage.setItem("aurora_log_" + k + "_backup", v); } catch(e) {} return { key: k, value: v }; }
};
function showRecoveryUI(reason) {
  var root = document.getElementById("root"); if (!root) return;
  var entries = [], known = [], upcoming = [];
  try { var r = localStorage.getItem("aurora_log_entries") || localStorage.getItem("aurora_log_entries_backup"); if (r) entries = JSON.parse(r); } catch(e) {}
  try { var r2 = localStorage.getItem("aurora_log_known_items") || localStorage.getItem("aurora_log_known_items_backup"); if (r2) known = JSON.parse(r2); } catch(e) {}
  try { var r3 = localStorage.getItem("aurora_log_upcoming") || localStorage.getItem("aurora_log_upcoming_backup"); if (r3) upcoming = JSON.parse(r3); } catch(e) {}
  var hasData = entries.length > 0 || known.length > 0 || upcoming.length > 0;
  var exportData = JSON.stringify({ entries: entries, knownItems: known, upcoming: upcoming, exportedAt: new Date().toISOString() }, null, 2);
  var h = '<div style="padding:24px 16px;font-family:Courier New,monospace;background:#0a0a0a;color:#f5f5f5;min-height:100vh"><div style="max-width:500px;margin:0 auto">';
  h += '<div style="color:#ff4444;font-weight:700;font-size:1rem;letter-spacing:0.1em;margin-bottom:6px">RECOVERY MODE</div>';
  h += '<div style="color:#666;font-size:0.78rem;margin-bottom:20px">' + (reason || "App failed to load.") + '</div>';
  if (hasData) {
    h += '<div style="color:#00c853;font-size:0.82rem;margin-bottom:12px;font-weight:700">DATA SAFE: ' + entries.length + ' entries, ' + upcoming.length + ' upcoming, ' + known.length + ' dict</div>';
    h += '<button id="copyBtn" style="background:#1a2d5a;color:#7aa8f0;border:1px solid #2a2a2a;padding:10px 16px;font-family:Courier New,monospace;font-weight:700;font-size:0.84rem;cursor:pointer;width:100%;margin-bottom:8px">COPY DATA BACKUP</button>';
    h += '<textarea id="exportArea" readonly style="width:100%;height:60px;background:#111;border:1px solid #2a2a2a;color:#555;font-size:0.68rem;padding:6px;font-family:Courier New,monospace;resize:vertical;margin-bottom:12px">' + exportData.replace(/</g, "&lt;") + '</textarea>';
  }
  h += '<div style="display:flex;gap:8px">';
  h += '<button id="retryBtn" style="background:#fff;color:#0a0a0a;border:none;padding:10px 20px;font-family:Courier New,monospace;font-weight:700;font-size:0.88rem;cursor:pointer;flex:1">RETRY</button>';
  h += '<button id="clearBtn" style="background:#2a0000;color:#ff4444;border:1px solid #4a0000;padding:10px 20px;font-family:Courier New,monospace;font-weight:700;font-size:0.88rem;cursor:pointer;flex:1">CLEAR + RELOAD</button>';
  h += '</div>';
  if (hasData) h += '<button id="restoreBtn" style="background:none;border:1px solid #2a2a2a;color:#888;padding:8px 16px;font-family:Courier New,monospace;font-size:0.76rem;cursor:pointer;width:100%;margin-top:8px">RESTORE FROM BACKUP</button>';
  h += '</div></div>';
  root.innerHTML = h;
  setTimeout(function() {
    var cb = document.getElementById("copyBtn");
    if (cb) cb.onclick = function() { if (navigator.clipboard) navigator.clipboard.writeText(exportData).then(function() { cb.textContent = "COPIED!"; cb.style.background = "#0a3a1a"; cb.style.color = "#00c853"; }); };
    var rb = document.getElementById("retryBtn"); if (rb) rb.onclick = function() { location.reload(); };
    var clb = document.getElementById("clearBtn"); if (clb) clb.onclick = function() { if (confirm("Erase all data? Copy backup first!")) { localStorage.clear(); location.reload(); } };
    var rsb = document.getElementById("restoreBtn"); if (rsb) rsb.onclick = function() {
      ["aurora_log_entries","aurora_log_known_items","aurora_log_upcoming"].forEach(function(k) { var b = localStorage.getItem(k + "_backup"); if (b) { try { JSON.parse(b); localStorage.setItem(k, b); } catch(e) {} } });
      location.reload();
    };
  }, 50);
}
window.onerror = function(msg, src, line) { showRecoveryUI("Error: " + msg + " (line " + line + ")"); return true; };
window._appMounted = false;
setTimeout(function() { if (!window._appMounted) showRecoveryUI("App failed to initialize. Your data is preserved."); }, 8000);
</script>
<script type="text/babel" data-type="module">
const { useState, useEffect, useRef } = React;

const STORES = ["Hillsboro", "Eugene", "Gresham", "Vancouver"];
const FENCE_RE = new RegExp(String.fromCharCode(96,96,96) + "json|" + String.fromCharCode(96,96,96), "g");
const inp = { width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", color: "#f5f5f5", padding: "8px 10px", fontSize: "0.97rem", outline: "none", fontFamily: "'Courier New', monospace", boxSizing: "border-box" };
const lbl = { display: "block", fontSize: "0.7rem", letterSpacing: "0.14em", color: "#666666", marginBottom: 4 };

function getApiKey() { return localStorage.getItem("aurora_api_key") || ""; }
function setApiKeyVal(k) { localStorage.setItem("aurora_api_key", k); }
function getApiHeaders() { return { "Content-Type": "application/json", "x-api-key": getApiKey(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" }; }
function today() { const n = new Date(); return n.getFullYear() + "-" + String(n.getMonth()+1).padStart(2,"0") + "-" + String(n.getDate()).padStart(2,"0"); }
function formatDateHeading(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return `${days[dt.getDay()]}, ${months[dt.getMonth()]} ${d}`;
}

function normalizeForMatch(str) {
  return (str || "").toLowerCase().replace(/[^a-z0-9]/g, " ").replace(/\s+/g, " ").trim();
}

function findBestMatch(name, knownItems) {
  if (!name || !knownItems.length) return null;
  const norm = normalizeForMatch(name);
  if (!norm) return null;
  const exact = knownItems.find(k => normalizeForMatch(k.name) === norm);
  if (exact) return exact;
  const tokens = norm.split(" ").filter(t => t.length > 1);
  if (!tokens.length) return null;
  let bestScore = 0, bestItem = null;
  for (const item of knownItems) {
    const kTokens = normalizeForMatch(item.name).split(" ").filter(t => t.length > 1);
    if (!kTokens.length) continue;
    let overlap = 0;
    for (const t of tokens) {
      if (kTokens.some(kt => kt.includes(t) || t.includes(kt))) overlap++;
    }
    const score = overlap / Math.max(tokens.length, kTokens.length);
    if (score > bestScore) { bestScore = score; bestItem = item; }
  }
  return bestScore >= 0.5 ? bestItem : null;
}

/* TOP-LEVEL — never nest inside another component */
function NameInput({ value, onChange, placeholder, knownItems, inputStyle }) {
  const [showSugg, setShowSugg] = useState(false);
  const [suggestions, setSuggestions] = useState([]);
  const items = knownItems || [];

  const handleChange = (e) => {
    const v = e.target.value;
    onChange(v);
    if (v.trim().length >= 2 && items.length > 0) {
      const norm = normalizeForMatch(v);
      const matches = items.filter(k => {
        const kn = normalizeForMatch(k.name);
        return kn.includes(norm) || norm.split(" ").some(t => t.length > 1 && kn.includes(t));
      }).slice(0, 5);
      setSuggestions(matches);
      setShowSugg(matches.length > 0);
    } else { setSuggestions([]); setShowSugg(false); }
  };

  const pick = (item) => { onChange(item.name); setSuggestions([]); setShowSugg(false); };
  const style = inputStyle || { ...inp, background: "#0a0a0a", fontSize: "0.88rem", padding: "5px 7px" };

  return (
    <div style={{ position: "relative" }}>
      <input value={value || ""} onChange={handleChange}
        onFocus={() => { if (suggestions.length) setShowSugg(true); }}
        onBlur={() => setTimeout(() => setShowSugg(false), 200)}
        placeholder={placeholder} style={style} />
      {showSugg && (
        <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#1a1a1a", border: "1px solid #333333", zIndex: 100, maxHeight: 140, overflowY: "auto" }}>
          {suggestions.map((s, i) => (
            <div key={i} onMouseDown={(e) => { e.preventDefault(); pick(s); }}
              style={{ padding: "6px 8px", fontSize: "0.82rem", color: "#cccccc", cursor: "pointer", borderBottom: "1px solid #222222" }}
              onMouseEnter={e => e.currentTarget.style.background = "#252525"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              {s.name} <span style={{ color: "#555555", fontSize: "0.72rem" }}>{s.unit}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AIIntake({ onSave, onSaveUpcoming, knownItems }) {
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState("");
  const [images, setImages] = useState([]);
  const fileRef = useRef();

  const knownItemsList = knownItems.length > 0
    ? "\n\nKNOWN ITEM NAMES (ALWAYS use these exact names when you recognize the same product):\n" + knownItems.map(k => `- "${k.name}"${k.unit ? ` (unit: ${k.unit})` : ""}`).join("\n")
    : "";

  const systemPrompt = `You are a document parser for Aurora, a construction and building materials supply warehouse in Portland, Oregon. Aurora's neighboring stores are: Hillsboro, Eugene, Gresham, Vancouver.

Identify the document type:

- "PO" — Purchase Order: supplies arriving from an external vendor or supplier
- "Transfer In" — Stock arriving AT Aurora FROM another store
- "Transfer Out" — Stock leaving Aurora TO another store

The user may provide MULTIPLE PHOTOS of the same document (e.g. a multi-page PO). Treat all images as pages of ONE document — combine all line items into a single result. Do NOT create separate entries per page.

Return ONLY valid JSON, no markdown:
{
  "type": "PO" or "Transfer In" or "Transfer Out",
  "party": vendor company name (for PO) or store name like "Hillsboro" (for transfers),
  "docId": document or order number as string, or "",
  "date": "YYYY-MM-DD" (use today ${today()} if not visible),
  "lineItems": [ { "name": "item name", "qty": number, "unit": "bags/pcs/rolls/etc" } ],
  "notes": ""
}

CRITICAL NAME MATCHING RULE: When a line item refers to the same product as a known item below, you MUST use the known item's exact name — even if the document abbreviates it, shortens it, or describes it differently.` + knownItemsList;

  const handleImage = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setImages(prev => [...prev, { base64: ev.target.result.split(",")[1], mediaType: file.type, preview: ev.target.result }]); };
    reader.readAsDataURL(file);
    if (fileRef.current) fileRef.current.value = "";
  };
  const removeImage = (idx) => setImages(prev => prev.filter((_, i) => i !== idx));
  const clearAllImages = () => { setImages([]); if (fileRef.current) fileRef.current.value = ""; };

  const parse = async () => {
    if (!input.trim() && images.length === 0) return;
    if (!getApiKey()) { setError("API key required — tap KEY in the header."); return; }
    setLoading(true); setError(""); setParsed(null);
    try {
      const userContent = [];
      images.forEach((img) => {
        userContent.push({ type: "image", source: { type: "base64", media_type: img.mediaType, data: img.base64 } });
      });
      const textPart = input.trim() || (images.length > 1 ? "Parse this " + images.length + "-page warehouse document. Combine all line items into one result." : "Parse this warehouse document.");
      userContent.push({ type: "text", text: textPart });
      const res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers: getApiHeaders(), body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 4096, system: systemPrompt, messages: [{ role: "user", content: userContent }] }) });
      const data = await res.json();
      if (data.error) { setError("API error: " + (data.error.message || "Unknown")); setLoading(false); return; }
      const text = data.content?.map(b => b.text || "").join("").trim();
      let result;
      try { result = JSON.parse(text.replace(FENCE_RE, "").trim()); } catch { setError("Couldn't parse — try again or enter manually."); setLoading(false); return; }
      if (result.lineItems) {
        result.lineItems = result.lineItems.map(li => {
          const match = findBestMatch(li.name, knownItems);
          if (match) return { ...li, name: match.name, unit: li.unit || match.unit || "", _matched: true };
          return { ...li, _matched: false };
        });
      }
      setParsed(result);
    } catch (e) { setError("Error: " + e.message); }
    setLoading(false);
  };

  const set = (k, v) => setParsed(p => ({ ...p, [k]: v }));
  const updateLine = (idx, key, val) => setParsed(p => ({ ...p, lineItems: p.lineItems.map((li, i) => i === idx ? { ...li, [key]: val } : li) }));
  const removeLine = (idx) => setParsed(p => ({ ...p, lineItems: p.lineItems.filter((_, i) => i !== idx) }));
  const addLine = () => setParsed(p => ({ ...p, lineItems: [...(p.lineItems || []), { name: "", qty: "", unit: "" }] }));
  const reset = () => { setParsed(null); setInput(""); clearAllImages(); };
  const confirm = () => { if (!parsed) return; onSave(parsed); reset(); };
  const stageUpcoming = () => { if (!parsed) return; onSaveUpcoming(parsed); reset(); };

  const typeAccent = { "PO": "#aaaaaa", "Transfer In": "#00e676", "Transfer Out": "#ff3d3d" };

  return (
    <div style={{ background: "#0a0a0a", borderBottom: "1px solid #2a2a2a", padding: "12px 14px" }}>
      {images.length > 0 && (
        <div style={{ marginBottom: 10, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-start" }}>
          {images.map((img, idx) => (
            <div key={idx} style={{ position: "relative", display: "inline-block" }}>
              <img src={img.preview} alt="" style={{ height: 80, maxWidth: 100, border: "1px solid #2a2a2a", display: "block", objectFit: "cover" }} />
              <button onClick={() => removeImage(idx)} style={{ position: "absolute", top: 2, right: 2, background: "#0a0a0a", border: "1px solid #2a2a2a", color: "#f5f5f5", cursor: "pointer", fontSize: "0.7rem", padding: "0px 4px", lineHeight: "16px" }}>x</button>
              <div style={{ position: "absolute", bottom: 2, left: 2, background: "#0a0a0a", color: "#666666", fontSize: "0.6rem", padding: "0 3px", fontWeight: 700 }}>{"P" + (idx + 1)}</div>
            </div>
          ))}
        </div>
      )}
      {!parsed && (
        <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
          <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); parse(); } }}
            placeholder={images.length > 0 ? images.length + " photo" + (images.length > 1 ? "s" : "") + " — add more or hit GO" : "Describe a PO or transfer, or snap a photo"}
            rows={2} style={{ ...inp, flex: 1, resize: "none", background: "#0a0a0a", fontSize: "0.9rem" }} />
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <button onClick={() => fileRef.current?.click()} style={{ background: images.length > 0 ? "#1a2d5a" : "#141414", border: "1px solid #2a2a2a", color: images.length > 0 ? "#7aa8f0" : "#666666", padding: "7px 11px", fontFamily: "'Courier New',monospace", fontWeight: 700, fontSize: "0.82rem", cursor: "pointer" }}>{images.length > 0 ? "+" + images.length : "PHOTO"}</button>
            <button onClick={parse} disabled={loading || (!input.trim() && images.length === 0)} style={{ background: loading ? "#141414" : "#ffffff", color: loading ? "#2d4a8a" : "#0a0a0a", border: "none", padding: "7px 11px", fontFamily: "'Courier New',monospace", fontWeight: 700, fontSize: "0.9rem", cursor: loading ? "default" : "pointer" }}>{loading ? "..." : "GO"}</button>
          </div>
        </div>
      )}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleImage} style={{ display: "none" }} />
      {error && <div style={{ marginTop: 8, color: "#ff4444", fontSize: "0.82rem", padding: "6px 8px", background: "#111111", border: "1px solid #1a0000" }}>{error}</div>}
      {parsed && (
        <div style={{ background: "#111111", border: "1px solid #2a2a2a", padding: "14px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <span style={{ color: typeAccent[parsed.type] || "#ffffff", fontWeight: 700, fontSize: "0.78rem", letterSpacing: "0.1em" }}>{(parsed.type || "").toUpperCase()}</span>
            <button onClick={reset} style={{ background: "none", border: "none", color: "#555555", cursor: "pointer", fontSize: "1.1rem" }}>x</button>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
            <div style={{ flex: "2 1 150px" }}>
              <label style={lbl}>{parsed.type === "PO" ? "VENDOR" : parsed.type === "Transfer In" ? "FROM STORE" : "TO STORE"}</label>
              {parsed.type !== "PO" ? (
                <select value={parsed.party || ""} onChange={e => set("party", e.target.value)} style={{ ...inp, background: "#0a0a0a", padding: "7px 9px" }}>
                  <option value="">Select store</option>
                  {STORES.map(s => <option key={s}>{s}</option>)}
                </select>
              ) : (
                <input value={parsed.party || ""} onChange={e => set("party", e.target.value)} style={{ ...inp, background: "#0a0a0a" }} />
              )}
            </div>
            <div style={{ flex: "1 1 90px" }}><label style={lbl}>DOC #</label><input value={parsed.docId || ""} onChange={e => set("docId", e.target.value)} style={{ ...inp, background: "#0a0a0a" }} /></div>
            <div style={{ flex: "1 1 110px" }}><label style={lbl}>DATE</label><input type="date" value={parsed.date || today()} onChange={e => set("date", e.target.value)} style={{ ...inp, background: "#0a0a0a" }} /></div>
          </div>
          <label style={{ ...lbl, marginBottom: 6 }}>LINE ITEMS</label>
          {(parsed.lineItems || []).map((li, idx) => (
            <div key={idx} style={{ marginBottom: 5 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 56px 56px 22px", gap: 5 }}>
                <NameInput value={li.name} onChange={v => updateLine(idx, "name", v)} placeholder="Item name" knownItems={knownItems} />
                <input value={li.qty || ""} onChange={e => updateLine(idx, "qty", e.target.value)} placeholder="Qty" style={{ ...inp, background: "#0a0a0a", fontSize: "0.88rem", padding: "5px 7px" }} />
                <input value={li.unit || ""} onChange={e => updateLine(idx, "unit", e.target.value)} placeholder="Unit" style={{ ...inp, background: "#0a0a0a", fontSize: "0.88rem", padding: "5px 7px" }} />
                <button onClick={() => removeLine(idx)} style={{ background: "none", border: "none", color: "#4a0000", cursor: "pointer", fontSize: "0.94rem", padding: 0, alignSelf: "center" }}>x</button>
              </div>
              {li._matched && <div style={{ fontSize: "0.66rem", color: "#00c853", letterSpacing: "0.06em", marginTop: 1, paddingLeft: 2 }}>MATCHED</div>}
            </div>
          ))}
          <button onClick={addLine} style={{ background: "none", border: "1px solid #2a2a2a", color: "#666666", padding: "3px 10px", fontFamily: "'Courier New',monospace", fontSize: "0.72rem", cursor: "pointer", marginTop: 2, marginBottom: 12 }}>+ LINE</button>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>

function ItemDictModal({ onClose, knownItems, setKnownItems, persistKnown }) {
  const [editName, setEditName] = useState(null);

  const startEdit = (item, idx) => { setEditName(idx); setEditVal(item.name); };
  const saveEdit = (idx) => { if (!editVal.trim()) return; const next = knownItems.map((k, i) => i === idx ? { ...k, name: editVal.trim() } : k); setKnownItems(next); persistKnown(next); setEditName(null); };

  return (

            {editName === idx ? (

                  style={{ ...inp, flex: 1, fontSize: "0.86rem", padding: "4px 7px", background: "#0a0a0a" }} autoFocus />
                <button onClick={() => saveEdit(idx)} style={{ background: "none", border: "none", color: "#00c853", cursor: "pointer", fontSize: "0.72rem", fontFamily: "'Courier New',monospace", fontWeight: 700 }}>SAVE</button>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <span onClick={() => startEdit(item, idx)} style={{ flex: 1, color: "#cccccc", fontSize: "0.88rem", cursor: "pointer" }}>
                  {item.name} {item.unit && <span style={{ color: "#444444", fontSize: "0.72rem" }}>({item.unit})</span>}

                <button onClick={() => remove(idx)} style={{ background: "none", border: "none", color: "#3a1010", cursor: "pointer", fontSize: "0.82rem" }}>x</button>
              </React.Fragment>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [entries, setEntries] = useState([]);
  const [upcoming, setUpcoming] = useState([]);
  const [knownItems, setKnownItems] = useState([]);
  const [tab, setTab] = useState("po");
  const [showIntake, setShowIntake] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showApiKey, setShowApiKey] = useState(false);
  const [showDict, setShowDict] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [editEntry, setEditEntry] = useState(null);

  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get("entries"); if (r?.value) setEntries(JSON.parse(r.value)); } catch {}
      try { const r = await window.storage.get("upcoming"); if (r?.value) setUpcoming(JSON.parse(r.value)); } catch {}
      try { const r = await window.storage.get("known_items"); if (r?.value) setKnownItems(JSON.parse(r.value)); } catch {}
      setLoaded(true);
      window._appMounted = true;
      if (!getApiKey()) setTimeout(() => setShowApiKey(true), 300);
    })();
  }, []);

  const persist = async (next) => { setEntries(next); try { await window.storage.set("entries", JSON.stringify(next)); } catch {} };
  const persistUpcoming = async (next) => { setUpcoming(next); try { await window.storage.set("upcoming", JSON.stringify(next)); } catch {} };
  const persistKnown = async (next) => { try { await window.storage.set("known_items", JSON.stringify(next)); } catch {} };

  const learnItems = (lineItems) => {
    const updated = [...knownItems];
    let changed = false;
    for (const li of (lineItems || [])) {
      const name = (li.name || "").trim();
      if (!name) continue;
      const exists = updated.some(k => normalizeForMatch(k.name) === normalizeForMatch(name));
      if (!exists) { updated.push({ name, unit: (li.unit || "").trim() }); changed = true; }
    }
    if (changed) { updated.sort((a, b) => a.name.localeCompare(b.name)); setKnownItems(updated); persistKnown(updated); }
  };

  const makeEntry = (data) => ({
    id: Date.now().toString() + Math.random().toString(36).slice(2, 5),
    type: data.type, party: (data.party || "").trim(), docId: (data.docId || "").trim(),
    date: data.date || today(),
    lineItems: (data.lineItems || []).filter(li => (li.name || "").trim()),
    notes: (data.notes || "").trim(), createdAt: Date.now()
  });

  const addEntry = (data) => {
    const entry = makeEntry(data);
    persist([entry, ...entries]);
    learnItems(entry.lineItems);
    setShowIntake(false);
  };

  const addUpcoming = (data) => {
    const entry = makeEntry(data);
    persistUpcoming([entry, ...upcoming]);
    learnItems(entry.lineItems);
    setShowIntake(false);
  };

  const confirmUpcoming = (upEntry) => {
    // Move from upcoming to entries
    persistUpcoming(upcoming.filter(u => u.id !== upEntry.id));
    const entry = { ...upEntry, createdAt: Date.now() };
    persist([entry, ...entries]);
  };

  const deleteUpcoming = (id) => persistUpcoming(upcoming.filter(u => u.id !== id));
  const deleteEntry = (id) => persist(entries.filter(e => e.id !== id));
  const handleEdit = (entry) => { setEditEntry(entry); setShowAdd(true); };
  const handleSaveEdit = (data) => {
    const updated = entries.map(e => e.id === editEntry.id ? {
      ...e, type: data.type, party: (data.party || "").trim(), docId: (data.docId || "").trim(),
      date: data.date || today(), lineItems: (data.lineItems || []).filter(li => (li.name || "").trim()), notes: (data.notes || "").trim()
    } : e);
    persist(updated);
    learnItems((data.lineItems || []).filter(li => (li.name || "").trim()));
    setEditEntry(null); setShowAdd(false);
  };

  const visible = tab === "po"
    ? entries.filter(e => e.type === "PO")
    : tab === "transfers"
    ? entries.filter(e => e.type === "Transfer In" || e.type === "Transfer Out")
    : [];
  const grouped = (() => {
    const map = {};
    visible.forEach(e => { if (!map[e.date]) map[e.date] = []; map[e.date].push(e); });
    return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
  })();
  const poCount = entries.filter(e => e.type === "PO").length;
  const trCount = entries.filter(e => e.type !== "PO").length;
  const upCount = upcoming.length;

  const tabBtn = (id, label, count, highlight) => (
    <button onClick={() => setTab(id)} style={{
      background: "none", border: "none",
      borderBottom: tab === id ? ("2px solid " + (highlight || "#ffffff")) : "2px solid transparent",
      color: tab === id ? (highlight || "#ffffff") : "#555555",
      padding: "9px 12px", fontFamily: "'Courier New',monospace", fontWeight: 700,
      fontSize: "0.78rem", letterSpacing: "0.08em", cursor: "pointer", whiteSpace: "nowrap", flex: "1 1 0", textAlign: "center"
    }}>
      {label}
      {count > 0 && <span style={{ marginLeft: 5, fontSize: "0.66rem", color: tab === id ? (highlight || "#ffffff") : "#444444" }}>{count}</span>}
    </button>
  );

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0a", color: "#f5f5f5", fontFamily: "'Courier New', monospace", maxWidth: 660, margin: "0 auto" }}>
      <div style={{ borderBottom: "2px solid #ffffff", padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: "0.62rem", letterSpacing: "0.22em", color: "#555555", marginBottom: 1 }}>AURORA</div>
          <div style={{ fontSize: "1.25rem", fontWeight: 700, color: "#ffffff", letterSpacing: "0.06em", lineHeight: 1 }}>RECEIVING LOG</div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <button onClick={() => setShowDict(true)} style={{ background: "none", border: "1px solid #2a2a2a", color: knownItems.length > 0 ? "#888888" : "#444444", padding: "5px 8px", fontFamily: "'Courier New',monospace", fontSize: "0.74rem", fontWeight: 700, cursor: "pointer" }}>
            DICT{knownItems.length > 0 && <span style={{ fontSize: "0.58rem", color: "#666666", marginLeft: 2 }}>{knownItems.length}</span>}
          </button>
          <button onClick={() => setShowIntake(s => !s)} style={{ background: showIntake ? "#141414" : "none", border: "1px solid " + (showIntake ? "rgba(255,255,255,0.33)" : "#2a2a2a"), color: showIntake ? "#ffffff" : "#666666", padding: "5px 10px", fontFamily: "'Courier New',monospace", fontSize: "0.74rem", fontWeight: 700, cursor: "pointer" }}>{showIntake ? "HIDE" : "SCAN"}</button>
          <button onClick={() => setShowAdd(true)} style={{ background: "#ffffff", color: "#0a0a0a", border: "none", padding: "5px 10px", fontFamily: "'Courier New',monospace", fontSize: "0.74rem", fontWeight: 700, cursor: "pointer" }}>+ LOG</button>
          <button onClick={() => setShowApiKey(true)} style={{ background: getApiKey() ? "none" : "#1a0000", border: "1px solid " + (getApiKey() ? "#2a2a2a" : "#8a2020"), color: getApiKey() ? "#555555" : "#c07070", padding: "5px 8px", fontFamily: "'Courier New',monospace", fontSize: "0.74rem", cursor: "pointer" }}>KEY</button>
        </div>
      </div>

      {showIntake && <AIIntake onSave={addEntry} onSaveUpcoming={addUpcoming} knownItems={knownItems} />}

      <div style={{ borderBottom: "1px solid #1a1a1a", display: "flex" }}>
        {tabBtn("po", "POs", poCount)}
        {tabBtn("transfers", "TRANSFERS", trCount)}
        {tabBtn("upcoming", "UPCOMING", upCount, "#c9a84c")}
      </div>

      <div style={{ padding: "0 12px 80px" }}>
        {!loaded ? (
          <div style={{ padding: 50, textAlign: "center", color: "#555555", fontSize: "0.84rem" }}>Loading...</div>
        ) : tab === "upcoming" ? (
          upcoming.length === 0 ? (
            <div style={{ padding: 60, textAlign: "center", color: "#2a2a2a", fontSize: "0.9rem" }}>No upcoming orders staged.</div>
          ) : (
            upcoming.map(entry => <UpcomingCard key={entry.id} entry={entry} onConfirm={confirmUpcoming} onDelete={deleteUpcoming} />)
          )
        ) : grouped.length === 0 ? (
          <div style={{ padding: 60, textAlign: "center", color: "#2a2a2a", fontSize: "0.9rem" }}>{"No " + (tab === "po" ? "purchase orders" : "transfers") + " logged yet."}</div>
        ) : (
          grouped.map(([date, dayEntries]) => (
            <div key={date}>
              <DateHeader dateStr={date} />
              {dayEntries.map(entry => <EntryCard key={entry.id} entry={entry} onDelete={deleteEntry} onEdit={handleEdit} />)}
            </div>
          ))
        )}
      </div>

      {showAdd && <AddModal onClose={() => { setShowAdd(false); setEditEntry(null); }} onSave={editEntry ? handleSaveEdit : addEntry} onSaveUpcoming={addUpcoming} defaultType={tab === "po" ? "PO" : tab === "transfers" ? "Transfer In" : "PO"} editEntry={editEntry} knownItems={knownItems} />}
      {showApiKey && <ApiKeyModal onClose={() => setShowApiKey(false)} />}
      {showDict && <ItemDictModal onClose={() => setShowDict(false)} knownItems={knownItems} setKnownItems={setKnownItems} persistKnown={persistKnown} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
