function formatDateHeading(dateStr) {
const [y, m, d] = dateStr.split(’-’).map(Number);

const days = [“Sunday”,“Monday”,“Tuesday”,“Wednesday”,“Thursday”,“Friday”,“Saturday”];

return `${days[dt.getDay()]}, ${months[dt.getMonth()]} ${d}`;

/* ── Item Dictionary helpers ── */
function normalizeForMatch(str) {
return (str || “”).toLowerCase().replace(/[^a-z0-9]/g, “ “).replace(/\s+/g, “ “).trim();
}

function findBestMatch(name, knownItems) {
if (!name || !knownItems.length) return null;
const norm = normalizeForMatch(name);
if (!norm) return null;
// Exact normalized match
const exact = knownItems.find(k => normalizeForMatch(k.name) === norm);
if (exact) return exact;
// Token-overlap scoring
const tokens = norm.split(” “).filter(t => t.length > 1);
if (!tokens.length) return null;
let bestScore = 0, bestItem = null;
for (const item of knownItems) {
const kTokens = normalizeForMatch(item.name).split(” “).filter(t => t.length > 1);
if (!kTokens.length) continue;
let overlap = 0;
for (const t of tokens) {
if (kTokens.some(kt => kt.includes(t) || t.includes(kt))) overlap++;
}
const score = overlap / Math.max(tokens.length, kTokens.length);
if (score > bestScore) { bestScore = score; bestItem = item; }
}
// Require at least 50% token overlap to match
return bestScore >= 0.5 ? bestItem : null;
}

function ItemDictModal({ onClose, knownItems, setKnownItems, persistKnown }) {
const [editName, setEditName] = useState(null);
const [editVal, setEditVal] = useState(””);

const remove = (idx) => {
const next = knownItems.filter((_, i) => i !== idx);
setKnownItems(next);
persistKnown(next);
};

const startEdit = (item, idx) => { setEditName(idx); setEditVal(item.name); };

const saveEdit = (idx) => {
if (!editVal.trim()) return;
const next = knownItems.map((k, i) => i === idx ? { …k, name: editVal.trim() } : k);
setKnownItems(next);
persistKnown(next);
setEditName(null);
};

return (
<div onClick={onClose} style={{ position: “fixed”, inset: 0, background: “rgba(8,7,5,0.88)”, display: “flex”, alignItems: “center”, justifyContent: “center”, zIndex: 1000 }}>

These names are auto-learned from every entry you log. The AI will match incoming documents to these names. Tap a name to edit it.
</div>
{knownItems.length === 0 && <div style={{ color: “#333333”, fontSize: “0.84rem”, padding: “20px 0”, textAlign: “center” }}>No items yet — log your first entry to start building the dictionary.</div>}
{knownItems.map((item, idx) => (
<div key={idx} style={{ display: “flex”, alignItems: “center”, gap: 8, padding: “6px 0”, borderBottom: “1px solid #1a1a1a” }}>
{editName === idx ? (
<React.Fragment>
<input value={editVal} onChange={e => setEditVal(e.target.value)} onKeyDown={e => { if (e.key === “Enter”) saveEdit(idx); }}
style={{ …inp, flex: 1, fontSize: “0.86rem”, padding: “4px 7px”, background: “#0a0a0a” }} autoFocus />
<button onClick={() => saveEdit(idx)} style={{ background: “none”, border: “none”, color: “#00c853”, cursor: “pointer”, fontSize: “0.72rem”, fontFamily: “‘Courier New’,monospace”, fontWeight: 700 }}>SAVE</button>
</React.Fragment>
) : (
<React.Fragment>
<span onClick={() => startEdit(item, idx)} style={{ flex: 1, color: “#cccccc”, fontSize: “0.88rem”, cursor: “pointer” }}>
{item.name} {item.unit && <span style={{ color: “#444444”, fontSize: “0.72rem” }}>({item.unit})</span>}
</span>
<button onClick={() => remove(idx)} style={{ background: “none”, border: “none”, color: “#3a1010”, cursor: “pointer”, fontSize: “0.82rem” }}>✕</button>
</React.Fragment>
)}
</div>
))}
</div>
</div>
);

function App() {
const [entries, setEntries] = useState([]);
const [knownItems, setKnownItems] = useState([]);
const [tab, setTab] = useState(“po”);
const [showIntake, setShowIntake] = useState(false);
const [showAdd, setShowAdd] = useState(false);
const [showApiKey, setShowApiKey] = useState(false);
const [showDict, setShowDict] = useState(false);
const [loaded, setLoaded] = useState(false);
const [editEntry, setEditEntry] = useState(null);

useEffect(() => {
(async () => {
try { const r = await window.storage.get(“entries”); if (r?.value) setEntries(JSON.parse(r.value)); } catch {}
try { const r = await window.storage.get(“known_items”); if (r?.value) setKnownItems(JSON.parse(r.value)); } catch {}
setLoaded(true);
if (!getApiKey()) setTimeout(() => setShowApiKey(true), 300);
})();
}, []);

const persist = async (next) => { setEntries(next); try { await window.storage.set(“entries”, JSON.stringify(next)); } catch {} };
const persistKnown = async (next) => { try { await window.storage.set(“known_items”, JSON.stringify(next)); } catch {} };

// Learn item names from line items
const learnItems = (lineItems) => {
const updated = […knownItems];
let changed = false;
for (const li of (lineItems || [])) {
const name = (li.name || “”).trim();
if (!name) continue;
const exists = updated.some(k => normalizeForMatch(k.name) === normalizeForMatch(name));
if (!exists) {
updated.push({ name, unit: (li.unit || “”).trim() });
changed = true;
}
}
if (changed) {
// Sort alphabetically
updated.sort((a, b) => a.name.localeCompare(b.name));
setKnownItems(updated);
persistKnown(updated);
}
};

const addEntry = (data) => {
const entry = {
id: Date.now().toString() + Math.random().toString(36).slice(2, 5),
type: data.type, party: (data.party || “”).trim(), docId: (data.docId || “”).trim(),
date: data.date || today(),
lineItems: (data.lineItems || []).filter(li => (li.name || “”).trim()),
notes: (data.notes || “”).trim(), createdAt: Date.now()
};
persist([entry, …entries]);
learnItems(entry.lineItems);
setShowIntake(false);
};

const deleteEntry = (id) => persist(entries.filter(e => e.id !== id));
const handleEdit = (entry) => { setEditEntry(entry); setShowAdd(true); };
const handleSaveEdit = (data) => {
const updated = entries.map(e => e.id === editEntry.id ? {
…e, type: data.type, party: (data.party || “”).trim(), docId: (data.docId || “”).trim(),
date: data.date || today(), lineItems: (data.lineItems || []).filter(li => (li.name || “”).trim()), notes: (data.notes || “”).trim()
} : e);
persist(updated);
learnItems((data.lineItems || []).filter(li => (li.name || “”).trim()));
setEditEntry(null);
setShowAdd(false);
};

const visible = tab === “po”
? entries.filter(e => e.type === “PO”)
: entries.filter(e => e.type === “Transfer In” || e.type === “Transfer Out”);

const grouped = (() => {
const map = {};
visible.forEach(e => { if (!map[e.date]) map[e.date] = []; map[e.date].push(e); });
return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
})();

const poCount = entries.filter(e => e.type === “PO”).length;
const trCount = entries.filter(e => e.type !== “PO”).length;

const tabBtn = (id, label, count) => (
<button onClick={() => setTab(id)} style={{
background: “none”, border: “none”,
borderBottom: tab === id ? “2px solid #ffffff” : “2px solid transparent”,
color: tab === id ? “#ffffff” : “#555555”,
padding: “9px 16px”, fontFamily: “‘Courier New’,monospace”, fontWeight: 700,
fontSize: “0.82rem”, letterSpacing: “0.1em”, cursor: “pointer”, whiteSpace: “nowrap”, flex: “1 1 0”, textAlign: “center”
}}>
{label}
{count > 0 && <span style={{ marginLeft: 6, fontSize: “0.68rem”, color: tab === id ? “#ffffff” : “#444444” }}>{count}</span>}
</button>
);

return (
<div style={{ minHeight: “100vh”, background: “#0a0a0a”, color: “#f5f5f5”, fontFamily: “‘Courier New’, monospace”, maxWidth: 660, margin: “0 auto” }}>
<div style={{ borderBottom: “2px solid #ffffff”, padding: “12px 14px”, display: “flex”, justifyContent: “space-between”, alignItems: “center” }}>
<div>
<div style={{ fontSize: “0.62rem”, letterSpacing: “0.22em”, color: “#555555”, marginBottom: 1 }}>AURORA</div>
<div style={{ fontSize: “1.25rem”, fontWeight: 700, color: “#ffffff”, letterSpacing: “0.06em”, lineHeight: 1 }}>RECEIVING LOG</div>
</div>
<div style={{ display: “flex”, gap: 6, alignItems: “center” }}>
<button onClick={() => setShowDict(true)} style={{ background: “none”, border: “1px solid #2a2a2a”, color: knownItems.length > 0 ? “#888888” : “#444444”, padding: “5px 8px”, fontFamily: “‘Courier New’,monospace”, fontSize: “0.74rem”, fontWeight: 700, cursor: “pointer”, letterSpacing: “0.06em”, position: “relative” }}>
📖{knownItems.length > 0 && <span style={{ fontSize: “0.58rem”, color: “#666666”, marginLeft: 2 }}>{knownItems.length}</span>}
</button>
<button onClick={() => setShowIntake(s => !s)} style={{ background: showIntake ? “#141414” : “none”, border: `1px solid ${showIntake ? "#ffffff55" : "#2a2a2a"}`, color: showIntake ? “#ffffff” : “#666666”, padding: “5px 10px”, fontFamily: “‘Courier New’,monospace”, fontSize: “0.74rem”, fontWeight: 700, cursor: “pointer”, letterSpacing: “0.06em” }}>{showIntake ? “HIDE” : “📷 SCAN”}</button>
<button onClick={() => setShowAdd(true)} style={{ background: “#ffffff”, color: “#0a0a0a”, border: “none”, padding: “5px 10px”, fontFamily: “‘Courier New’,monospace”, fontSize: “0.74rem”, fontWeight: 700, cursor: “pointer”, letterSpacing: “0.06em” }}>+ LOG</button>
<button onClick={() => setShowApiKey(true)} style={{ background: getApiKey() ? “none” : “#1a0000”, border: `1px solid ${getApiKey() ? "#2a2a2a" : "#8a2020"}`, color: getApiKey() ? “#555555” : “#c07070”, padding: “5px 8px”, fontFamily: “‘Courier New’,monospace”, fontSize: “0.74rem”, cursor: “pointer” }}>🔑</button>
</div>
</div>

```
  {showIntake && <AIIntake onSave={addEntry} knownItems={knownItems} />}

  <div style={{ borderBottom: "1px solid #1a1a1a", display: "flex" }}>
    {tabBtn("po", "PURCHASE ORDERS", poCount)}
    {tabBtn("transfers", "TRANSFERS", trCount)}
  </div>

  <div style={{ padding: "0 12px 80px" }}>
    {!loaded ? (
      <div style={{ padding: 50, textAlign: "center", color: "#555555", fontSize: "0.84rem" }}>Loading...</div>
    ) : grouped.length === 0 ? (
      <div style={{ padding: 60, textAlign: "center", color: "#2a2a2a", fontSize: "0.9rem" }}>No {tab === "po" ? "purchase orders" : "transfers"} logged yet.</div>
    ) : (
      grouped.map(([date, dayEntries]) => (
        <div key={date}>
          <DateHeader dateStr={date} />
          {dayEntries.map(entry => <EntryCard key={entry.id} entry={entry} onDelete={deleteEntry} onEdit={handleEdit} />)}
        </div>
      ))
    )}
  </div>

  {showAdd && <AddModal
    onClose={() => { setShowAdd(false); setEditEntry(null); }}
    onSave={editEntry ? handleSaveEdit : addEntry}
    defaultType={tab === "po" ? "PO" : "Transfer In"}
    editEntry={editEntry}
    knownItems={knownItems}
  />}
  {showApiKey && <ApiKeyModal onClose={() => setShowApiKey(false)} />}
  {showDict && <ItemDictModal onClose={() => setShowDict(false)} knownItems={knownItems} setKnownItems={setKnownItems} persistKnown={persistKnown} />}
</div>
```

);
}

ReactDOM.render(<App />, document.getElementById(“root”));
</script>
