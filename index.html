<!DOCTYPE html>

<html><head><meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head><body>
<div id="root"></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById("root").innerHTML = '<pre style="color:red;padding:20px">' + msg + '\nLine: ' + line + '\nCol: ' + col + '\n' + (err ? err.stack : 'no stack') + '</pre>';
};
</script>
<script type="text/babel">
const { useState } = React;
function App() {
  const [count, setCount] = useState(0);
  return <div style={{padding:40,color:"#fff",background:"#0a0a0a",fontFamily:"monospace"}}>
    <h2>Test: {count}</h2>
    <button onClick={() => setCount(c => c+1)} style={{padding:10,fontSize:16}}>Click</button>
  </div>;
}
ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body></html>
