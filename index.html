<script type="text/babel" data-type="module">
const { useState, useEffect, useRef } = React;

const STORES = ["Hillsboro", "Eugene", "Gresham", "Vancouver"];
const FENCE_RE = new RegExp(String.fromCharCode(96,96,96) + "json|" + String.fromCharCode(96,96,96), "g");
const inp = { width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", color: "#f5f5f5", padding: "8px 10px", fontSize: "0.97rem", outline: "none", fontFamily: "'Courier New', monospace", boxSizing: "border-box" };
const lbl = { display: "block", fontSize: "0.7rem", letterSpacing: "0.14em", color: "#666666", marginBottom: 4 };

const DEFAULT_PULL_PRIORITY = [
  "stakes", "bag ties", "form oil", "dobies", "bolts", "pier papers", "form clips/flat ties", "snap ties", "misc"
];

function getApiKey() { return localStorage.getItem("aurora_api_key") || ""; }
function setApiKeyVal(k) { localStorage.setItem("aurora_api_key", k); }
function getApiHeaders() { return { "Content-Type": "application/json", "x-api-key": getApiKey(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" }; }
function today() { const n = new Date(); return n.getFullYear() + "-" + String(n.getMonth()+1).padStart(2,"0") + "-" + String(n.getDate()).padStart(2,"0"); }
function formatDateHeading(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return `${days[dt.getDay()]}, ${months[dt.getMonth()]} ${d}`;
}

function normalizeForMatch(str) {
  return (str || "").toLowerCase().replace(/[^a-z0-9]/g, " ").replace(/\s+/g, " ").trim();
}

function findBestMatch(name, knownItems) {
  if (!name || !knownItems.length) return null;
  const norm = normalizeForMatch(name);
  if (!norm) return null;
  const exact = knownItems.find(k => normalizeForMatch(k.name) === norm);
  if (exact) return exact;
  const tokens = norm.split(" ").filter(t => t.length > 1);
  if (!tokens.length) return null;
  let bestScore = 0, bestItem = null;
  for (const item of knownItems) {
    const kTokens = normalizeForMatch(item.name).split(" ").filter(t => t.length > 1);
    if (!kTokens.length) continue;
    let overlap = 0;
    for (const t of tokens) {
      if (kTokens.some(kt => kt.includes(t) || t.includes(kt))) overlap++;
    }
    const score = overlap / Math.max(tokens.length, kTokens.length);
    if (score > bestScore) { bestScore = score; bestItem = item; }
  }
  return bestScore >= 0.5 ? bestItem : null;
}

function extractJSON(text) {
  // Strip any markdown fences aggressively (handles newlines, spaces, variants)
  let cleaned = text.replace(FENCE_RE, "");
  // Also strip any remaining lines that are just whitespace or "json"
  cleaned = cleaned.replace(/^\s*json\s*$/gm, "").trim();
  // Try direct parse
  try { return JSON.parse(cleaned); } catch(e) { console.log("extractJSON direct parse failed:", e.message); }
  // Try to find JSON object in the text
  const start = cleaned.indexOf("{");
  const end = cleaned.lastIndexOf("}");
  if (start !== -1 && end > start) {
    try { return JSON.parse(cleaned.slice(start, end + 1)); } catch(e) { console.log("extractJSON object extract failed:", e.message, "slice:", cleaned.slice(Math.max(end - 30, start), end + 1)); }
  }
  // Try to find JSON array
  const aStart = cleaned.indexOf("[");
  const aEnd = cleaned.lastIndexOf("]");
  if (aStart !== -1 && aEnd > aStart) {
    try { return JSON.parse(cleaned.slice(aStart, aEnd + 1)); } catch(e) {}
  }
  console.log("extractJSON failed. Full cleaned text:", cleaned);
  return null;
}

function matchPriority(itemName, priorityList) {
  const norm = normalizeForMatch(itemName);
  for (let i = 0; i < priorityList.length; i++) {
    const raw = priorityList[i];
    const alternatives = raw.split("/").map(s => s.trim()).filter(Boolean);
    const matched = alternatives.some(alt => {
      const catTokens = normalizeForMatch(alt).split(" ").filter(t => t.length > 1);
      if (!catTokens.length) return false;
      return catTokens.every(ct => norm.includes(ct));
    });
    if (matched) return i;
  }
  return priorityList.length;
}

/* ====== GITHUB SYNC MODULE ====== */
const GitHubSync = {
  OWNER: "neimaD7",
  REPO: "aurora-log-data",
  _shas: {},
  _debounceTimers: {},
  _listeners: [],
  _status: "idle",
  _lastSync: null,
  _error: null,

  getToken() { return localStorage.getItem("aurora_sync_token") || ""; },
  setToken(t) { localStorage.setItem("aurora_sync_token", t); },
  isConfigured() { return !!this.getToken(); },

  _notifyListeners() {
    const state = { status: this._status, lastSync: this._lastSync, error: this._error };
    this._listeners.forEach(fn => { try { fn(state); } catch(e) {} });
  },
  onStatusChange(fn) { this._listeners.push(fn); return () => { this._listeners = this._listeners.filter(f => f !== fn); }; },

  _setStatus(s, err) {
    this._status = s;
    if (err) this._error = err;
    if (s === "synced") { this._lastSync = Date.now(); this._error = null; }
    this._notifyListeners();
  },

  async _apiGet(path) {
    const res = await fetch(`https://api.github.com/repos/${this.OWNER}/${this.REPO}/contents/${path}`, {
      headers: { "Authorization": "Bearer " + this.getToken(), "Accept": "application/vnd.github.v3+json" }
    });
    if (res.status === 404) return null;
    if (res.status === 403 || res.status === 429) { throw new Error("Rate limited"); }
    if (!res.ok) throw new Error("GitHub API error: " + res.status);
    return res.json();
  },

  async _apiPut(path, content, sha) {
    const body = { message: "sync " + path, content: btoa(unescape(encodeURIComponent(content))) };
    if (sha) body.sha = sha;
    const res = await fetch(`https://api.github.com/repos/${this.OWNER}/${this.REPO}/contents/${path}`, {
      method: "PUT",
      headers: { "Authorization": "Bearer " + this.getToken(), "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (res.status === 409) { return { conflict: true }; }
    if (res.status === 403 || res.status === 429) { throw new Error("Rate limited"); }
    if (!res.ok) throw new Error("GitHub PUT error: " + res.status);
    const data = await res.json();
    this._shas[path] = data.content.sha;
    return data;
  },

  async pull(dataType) {
    const path = dataType + ".json";
    try {
      const file = await this._apiGet(path);
      if (!file) return null;
      this._shas[path] = file.sha;
      const decoded = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ""))));
      return JSON.parse(decoded);
    } catch(e) {
      console.error("Sync pull error (" + dataType + "):", e);
      throw e;
    }
  },

  async push(dataType, localData) {
    if (!this.isConfigured()) return;
    const path = dataType + ".json";
    try {
      this._setStatus("syncing");
      // Get current remote for SHA and merge
      let remoteData = null;
      try {
        const file = await this._apiGet(path);
        if (file) {
          this._shas[path] = file.sha;
          const decoded = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ""))));
          remoteData = JSON.parse(decoded);
        }
      } catch(e) { /* file doesn't exist yet, that's fine */ }

      // Merge
      let merged;
      if (dataType === "known_items") {
        merged = this._mergeKnownItems(localData, remoteData);
      } else {
        merged = this._mergeEntries(localData, remoteData);
      }

      const content = JSON.stringify(merged, null, 2);
      const result = await this._apiPut(path, content, this._shas[path]);

      if (result && result.conflict) {
        // SHA mismatch — re-pull and retry once
        const file = await this._apiGet(path);
        if (file) {
          this._shas[path] = file.sha;
          const decoded = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ""))));
          remoteData = JSON.parse(decoded);
          merged = dataType === "known_items" ? this._mergeKnownItems(localData, remoteData) : this._mergeEntries(localData, remoteData);
          await this._apiPut(path, JSON.stringify(merged, null, 2), this._shas[path]);
        }
      }

      this._setStatus("synced");
      return merged;
    } catch(e) {
      console.error("Sync push error (" + dataType + "):", e);
      this._setStatus("error", e.message);
      throw e;
    }
  },

  _mergeEntries(local, remote) {
    if (!remote) return local || [];
    if (!local) return remote;
    const map = {};
    // Add remote entries first
    for (const entry of remote) {
      map[entry.id] = entry;
    }
    // Overlay local entries — last-modified wins
    for (const entry of local) {
      const existing = map[entry.id];
      if (!existing || (entry.modifiedAt || 0) >= (existing.modifiedAt || 0)) {
        map[entry.id] = entry;
      }
    }
    return Object.values(map);
  },

  _mergeKnownItems(local, remote) {
    if (!remote) return local || [];
    if (!local) return remote;
    const map = {};
    for (const item of remote) {
      map[normalizeForMatch(item.name)] = item;
    }
    for (const item of local) {
      const key = normalizeForMatch(item.name);
      if (!map[key]) {
        map[key] = item;
      }
    }
    return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
  },

  debouncedPush(dataType, localData) {
    if (!this.isConfigured()) return;
    if (this._debounceTimers[dataType]) clearTimeout(this._debounceTimers[dataType]);
    this._debounceTimers[dataType] = setTimeout(() => {
      this.push(dataType, localData).catch(() => {});
    }, 2500);
  },

  async fullSync(getLocal, setLocal) {
    if (!this.isConfigured()) return;
    this._setStatus("syncing");
    const types = [
      { key: "entries", storageKey: "entries" },
      { key: "upcoming", storageKey: "upcoming" },
      { key: "known_items", storageKey: "known_items" }
    ];
    // Phase 1: Pull and merge only
    for (const t of types) {
      try {
        const remoteData = await this.pull(t.key);
        if (remoteData) {
          const localData = getLocal(t.storageKey);
          let merged;
          if (t.key === "known_items") {
            merged = this._mergeKnownItems(localData, remoteData);
          } else {
            merged = this._mergeEntries(localData, remoteData);
          }
          setLocal(t.storageKey, merged);
        }
      } catch(e) { console.error("fullSync pull error for " + t.key + ":", e); }
    }
    // Phase 2: Push all local data back (creates missing files, syncs merged results)
    for (const t of types) {
      try {
        const data = getLocal(t.storageKey);
        if (data && data.length > 0) {
          await this.push(t.key, data);
        }
      } catch(e) { console.error("fullSync push error for " + t.key + ":", e); }
    }
    this._setStatus("synced");
  }
};

/* TOP-LEVEL — never nest inside another component */
function NameInput({ value, onChange, placeholder, knownItems, inputStyle }) {
  const [showSugg, setShowSugg] = useState(false);
  const [suggestions, setSuggestions] = useState([]);
  const items = knownItems || [];

  const handleChange = (e) => {
    const v = e.target.value;
    onChange(v);
    if (v.trim().length >= 2 && items.length > 0) {
      const norm = normalizeForMatch(v);
      const matches = items.filter(k => {
        const kn = normalizeForMatch(k.name);
        return kn.includes(norm) || norm.split(" ").some(t => t.length > 1 && kn.includes(t));
      }).slice(0, 5);
      setSuggestions(matches);
      setShowSugg(matches.length > 0);
    } else { setSuggestions([]); setShowSugg(false); }
  };

  const pick = (item) => { onChange(item.name); setSuggestions([]); setShowSugg(false); };
  const style = inputStyle || { ...inp, background: "#0a0a0a", fontSize: "0.88rem", padding: "5px 7px" };

  return (
    <div style={{ position: "relative" }}>
      <input value={value || ""} onChange={handleChange}
        onFocus={() => { if (suggestions.length) setShowSugg(true); }}
        onBlur={() => setTimeout(() => setShowSugg(false), 200)}
        placeholder={placeholder} style={style} />
      {showSugg && (
        <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#1a1a1a", border: "1px solid #333333", zIndex: 100, maxHeight: 140, overflowY: "auto" }}>
          {suggestions.map((s, i) => (
            <div key={i} onMouseDown={(e) => { e.preventDefault(); pick(s); }}
              style={{ padding: "6px 8px", fontSize: "0.82rem", color: "#cccccc", cursor: "pointer", borderBottom: "1px solid #222222" }}
              onMouseEnter={e => e.currentTarget.style.background = "#252525"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              {s.name} <span style={{ color: "#555555", fontSize: "0.72rem" }}>{s.unit}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

The user may provide MULTIPLE PHOTOS of the same document (e.g. a multi-page PO). Treat all images as pages of ONE document — combine all line items into a single result. Do NOT create separate entries per page.

Return ONLY valid JSON, no markdown:

}

CRITICAL NAME MATCHING RULE: When a line item refers to the same product as a known item below, you MUST use the known item's exact name — even if the document abbreviates it, shortens it, or describes it differently.` + knownItemsList;

  const handleImage = (e) => {

    if (idx <= 0) return;
    const next = [...items];
    [next[idx - 1], next[idx]] = [next[idx], next[idx - 1]];
    setItems(next);
  };
  const moveDown = (idx) => {
    if (idx >= items.length - 1) return;
    const next = [...items];
    [next[idx], next[idx + 1]] = [next[idx + 1], next[idx]];
    setItems(next);
  };
  const remove = (idx) => setItems(items.filter((_, i) => i !== idx));
  const add = () => {
    const val = newCat.trim();
    if (!val) return;
    setItems([...items, val]);
    setNewCat("");
  };
  const save = () => { onSave(items); onClose(); };

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(8,7,5,0.88)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#141414", border: "1px solid #2a2a2a", width: "min(420px,96vw)", maxHeight: "85vh", overflowY: "auto", padding: "18px 16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <span style={{ color: "#ffffff", fontWeight: 700, fontSize: "0.94rem", letterSpacing: "0.12em" }}>PULL ORDER</span>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#555555", cursor: "pointer", fontSize: "1.3rem" }}>x</button>
        </div>
        <div style={{ fontSize: "0.72rem", color: "#555555", marginBottom: 14, lineHeight: 1.5 }}>Items matching earlier categories get pulled first. Use arrows to reorder.</div>
        {items.map((cat, idx) => (
          <div key={idx} style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 0", borderBottom: "1px solid #1a1a1a" }}>
            <span style={{ color: "#444444", fontSize: "0.68rem", fontWeight: 700, width: 18, textAlign: "center", flexShrink: 0 }}>{idx + 1}</span>
            <span style={{ flex: 1, color: "#cccccc", fontSize: "0.88rem" }}>{cat}</span>
            <button onClick={() => moveUp(idx)} disabled={idx === 0} style={{ background: "none", border: "1px solid " + (idx === 0 ? "#1a1a1a" : "#2a2a2a"), color: idx === 0 ? "#1a1a1a" : "#888888", padding: "3px 7px", fontFamily: "'Courier New',monospace", fontSize: "0.76rem", cursor: idx === 0 ? "default" : "pointer" }}>&#9650;</button>
            <button onClick={() => moveDown(idx)} disabled={idx === items.length - 1} style={{ background: "none", border: "1px solid " + (idx === items.length - 1 ? "#1a1a1a" : "#2a2a2a"), color: idx === items.length - 1 ? "#1a1a1a" : "#888888", padding: "3px 7px", fontFamily: "'Courier New',monospace", fontSize: "0.76rem", cursor: idx === items.length - 1 ? "default" : "pointer" }}>&#9660;</button>
            <button onClick={() => remove(idx)} style={{ background: "none", border: "none", color: "#3a1010", cursor: "pointer", fontSize: "0.82rem", padding: "0 4px" }}>x</button>
          </div>
        ))}
        <div style={{ display: "flex", gap: 6, marginTop: 10, marginBottom: 14 }}>
          <input value={newCat} onChange={e => setNewCat(e.target.value)} onKeyDown={e => { if (e.key === "Enter") add(); }}
            placeholder="New category..." style={{ ...inp, flex: 1, fontSize: "0.84rem", padding: "5px 7px", background: "#0a0a0a" }} />
          <button onClick={add} style={{ background: "none", border: "1px solid #2a2a2a", color: "#666666", padding: "5px 10px", fontFamily: "'Courier New',monospace", fontSize: "0.74rem", cursor: "pointer" }}>+ ADD</button>
        </div>
        <button onClick={save} style={{ width: "100%", background: "#ffffff", color: "#0a0a0a", border: "none", padding: "10px", fontFamily: "'Courier New',monospace", fontWeight: 700, fontSize: "0.93rem", letterSpacing: "0.08em", cursor: "pointer" }}>SAVE ORDER</button>
      </div>
    </div>
  );
}

function SyncStatusBar({ syncState }) {
  if (!GitHubSync.isConfigured()) return null;
  const { status, lastSync, error } = syncState;
  let text = "";
  let color = "#333333";
  if (status === "syncing") { text = "SYNCING..."; color = "#5b8fff"; }
  else if (status === "error") { text = "SYNC ERROR"; color = "#ff4444"; }
  else if (status === "synced" && lastSync) {
    const ago = Math.round((Date.now() - lastSync) / 1000);
    if (ago < 60) text = "SYNCED " + ago + "s AGO";
    else if (ago < 3600) text = "SYNCED " + Math.round(ago / 60) + "m AGO";
    else text = "SYNCED " + Math.round(ago / 3600) + "h AGO";
    color = "#2a4a2a";
  } else { text = "SYNC IDLE"; color = "#333333"; }

  return (
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, textAlign: "center", padding: "4px 0", background: "#0a0a0a", borderTop: "1px solid #141414", zIndex: 500 }}>
      <span style={{ fontSize: "0.58rem", letterSpacing: "0.12em", color, fontFamily: "'Courier New', monospace" }}>{text}</span>
      {error && <span style={{ fontSize: "0.52rem", color: "#ff4444", marginLeft: 6 }}>{error}</span>}
    </div>
  );
}

function App() {
  const [entries, setEntries] = useState([]);
  const [upcoming, setUpcoming] = useState([]);
  const [knownItems, setKnownItems] = useState([]);
  const [pullQueue, setPullQueue] = useState([]);
  const [pullPriority, setPullPriority] = useState([...DEFAULT_PULL_PRIORITY]);
  const [checkedItems, setCheckedItems] = useState({});
  const [expandedItems, setExpandedItems] = useState({});
  const [tab, setTab] = useState("po");
  const [showIntake, setShowIntake] = useState(false);
  const [showPullIntake, setShowPullIntake] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showApiKey, setShowApiKey] = useState(false);
  const [showDict, setShowDict] = useState(false);
  const [showLabels, setShowLabels] = useState(false);
  const [showPriority, setShowPriority] = useState(false);
  const [showSOList, setShowSOList] = useState(false);
  const [showSyncToken, setShowSyncToken] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [editEntry, setEditEntry] = useState(null);
  const [editMode, setEditMode] = useState(null);
  const [dataLost, setDataLost] = useState(false);
  const [syncState, setSyncState] = useState({ status: "idle", lastSync: null, error: null });

  // Keep refs for sync callbacks to access latest state
  const entriesRef = useRef(entries);
  const upcomingRef = useRef(upcoming);
  const knownItemsRef = useRef(knownItems);
  useEffect(() => { entriesRef.current = entries; }, [entries]);
  useEffect(() => { upcomingRef.current = upcoming; }, [upcoming]);
  useEffect(() => { knownItemsRef.current = knownItems; }, [knownItems]);

  useEffect(() => {
    // Listen for sync status changes
    const unsub = GitHubSync.onStatusChange(setSyncState);

    (async () => {
      let localEntries = [], localUpcoming = [], localKnown = [];
      try { const r = await window.storage.get("entries"); if (r?.value) { localEntries = JSON.parse(r.value); setEntries(localEntries); } } catch {}
      try { const r = await window.storage.get("upcoming"); if (r?.value) { localUpcoming = JSON.parse(r.value); setUpcoming(localUpcoming); } } catch {}
      try { const r = await window.storage.get("known_items"); if (r?.value) { localKnown = JSON.parse(r.value); setKnownItems(localKnown); } } catch {}
      try { const r = await window.storage.get("pull_queue"); if (r?.value) setPullQueue(JSON.parse(r.value)); } catch {}
      try { const r = await window.storage.get("pull_priority"); if (r?.value) { const v = JSON.parse(r.value); if (Array.isArray(v) && v.length > 0) setPullPriority(v); } } catch {}
      setLoaded(true);
      window._appMounted = true;
      if (window._dataLost) setDataLost(true);
      if (!getApiKey()) setTimeout(() => setShowApiKey(true), 300);

      // Background sync on load
      if (GitHubSync.isConfigured()) {
        try {
          await GitHubSync.fullSync(
            (key) => {
              if (key === "entries") return localEntries;
              if (key === "upcoming") return localUpcoming;
              if (key === "known_items") return localKnown;
              return [];
            },
            (key, merged) => {
              if (key === "entries") { localEntries = merged; setEntries(merged); window.storage.set("entries", JSON.stringify(merged)); }
              if (key === "upcoming") { localUpcoming = merged; setUpcoming(merged); window.storage.set("upcoming", JSON.stringify(merged)); }
              if (key === "known_items") { localKnown = merged; setKnownItems(merged); window.storage.set("known_items", JSON.stringify(merged)); }
            }
          );
        } catch(e) { console.error("Initial sync failed:", e); }
      }
    })();

    return unsub;
  }, []);

  // Update sync status bar every 30s so "synced Xs ago" updates
  useEffect(() => {
    const interval = setInterval(() => {
      if (syncState.lastSync) setSyncState(s => ({ ...s }));
    }, 30000);
    return () => clearInterval(interval);
  }, [syncState.lastSync]);

  const persist = async (next) => {
    setEntries(next);
    try { await window.storage.set("entries", JSON.stringify(next)); } catch {}
    GitHubSync.debouncedPush("entries", next);
  };
  const persistUpcoming = async (next) => {
    setUpcoming(next);
    try { await window.storage.set("upcoming", JSON.stringify(next)); } catch {}
    GitHubSync.debouncedPush("upcoming", next);
  };
  const persistKnown = async (next) => {
    try { await window.storage.set("known_items", JSON.stringify(next)); } catch {}
    GitHubSync.debouncedPush("known_items", next);
  };
  const persistPullQueue = async (next) => { setPullQueue(next); try { await window.storage.set("pull_queue", JSON.stringify(next)); } catch {} };
  const persistPullPriority = async (next) => { setPullPriority(next); try { await window.storage.set("pull_priority", JSON.stringify(next)); } catch {} };

  const learnItems = (lineItems) => {
    const updated = [...knownItems];
    let changed = false;
    for (const li of (lineItems || [])) {
      const name = (li.name || "").trim();
      if (!name) continue;
      const exists = updated.some(k => normalizeForMatch(k.name) === normalizeForMatch(name));
      if (!exists) { updated.push({ name, unit: (li.unit || "").trim() }); changed = true; }
    }
    if (changed) { updated.sort((a, b) => a.name.localeCompare(b.name)); setKnownItems(updated); persistKnown(updated); }
  };

  const makeEntry = (data) => ({
    id: Date.now().toString() + Math.random().toString(36).slice(2, 5),
    type: data.type, party: (data.party || "").trim(), docId: (data.docId || "").trim(),
    date: data.date || today(),
    lineItems: (data.lineItems || []).filter(li => (li.name || "").trim()),
    notes: (data.notes || "").trim(), createdAt: Date.now(), modifiedAt: Date.now()
  });

  const addEntry = (data) => {
    const entry = makeEntry(data);
    persist([entry, ...entries]);
    learnItems(entry.lineItems);
    setShowIntake(false);
  };

  const addUpcoming = (data) => {
    const entry = makeEntry(data);
    persistUpcoming([entry, ...upcoming]);
    learnItems(entry.lineItems);
    setShowIntake(false);
  };

  const confirmUpcoming = (upEntry) => {
    // Soft-delete from upcoming
    const updatedUpcoming = upcoming.map(u => u.id === upEntry.id ? { ...u, _deleted: true, modifiedAt: Date.now() } : u);
    persistUpcoming(updatedUpcoming);
    const entry = { ...upEntry, _deleted: false, date: today(), createdAt: Date.now(), modifiedAt: Date.now() };
    persist([entry, ...entries]);
  };

  // Soft-delete instead of filtering
  const deleteUpcoming = (id) => {
    const updated = upcoming.map(u => u.id === id ? { ...u, _deleted: true, modifiedAt: Date.now() } : u);
    persistUpcoming(updated);
  };
  const deleteEntry = (id) => {
    const updated = entries.map(e => e.id === id ? { ...e, _deleted: true, modifiedAt: Date.now() } : e);
    persist(updated);
  };

  const handleEdit = (entry) => { setEditEntry(entry); setEditMode("entry"); setShowAdd(true); };
  const handleEditUpcoming = (entry) => { setEditEntry(entry); setEditMode("upcoming"); setShowAdd(true); };

  const handleSaveEdit = (data) => {
    if (editMode === "upcoming") {
      const updated = upcoming.map(e => e.id === editEntry.id ? {
        ...e, type: data.type, party: (data.party || "").trim(), docId: (data.docId || "").trim(),
        date: data.date || today(), lineItems: (data.lineItems || []).filter(li => (li.name || "").trim()), notes: (data.notes || "").trim(),
        modifiedAt: Date.now()
      } : e);
      persistUpcoming(updated);
    } else {
      const updated = entries.map(e => e.id === editEntry.id ? {
        ...e, type: data.type, party: (data.party || "").trim(), docId: (data.docId || "").trim(),
        date: data.date || today(), lineItems: (data.lineItems || []).filter(li => (li.name || "").trim()), notes: (data.notes || "").trim(),
        modifiedAt: Date.now()
      } : e);
      persist(updated);
    }
    learnItems((data.lineItems || []).filter(li => (li.name || "").trim()));
    setEditEntry(null); setEditMode(null); setShowAdd(false);
  };

  const closeModal = () => { setShowAdd(false); setEditEntry(null); setEditMode(null); };

  const handleSyncSaved = () => {
    // Trigger a full sync after saving the token
    if (GitHubSync.isConfigured()) {
      // Use a local snapshot that gets updated by setLocal callbacks
      let snapEntries = [...entriesRef.current];
      let snapUpcoming = [...upcomingRef.current];
      let snapKnown = [...knownItemsRef.current];
      GitHubSync.fullSync(
        (key) => {
          if (key === "entries") return snapEntries;
          if (key === "upcoming") return snapUpcoming;
          if (key === "known_items") return snapKnown;
          return [];
        },
        (key, merged) => {
          if (key === "entries") { snapEntries = merged; setEntries(merged); window.storage.set("entries", JSON.stringify(merged)); }
          if (key === "upcoming") { snapUpcoming = merged; setUpcoming(merged); window.storage.set("upcoming", JSON.stringify(merged)); }
          if (key === "known_items") { snapKnown = merged; setKnownItems(merged); window.storage.set("known_items", JSON.stringify(merged)); }
        }
      ).catch(e => console.error("Sync after token save failed:", e));
    }
  };

  /* ===== PULL SHEET LOGIC ===== */
  const loadDemoSOs = () => {
    const demoSOs = [
      {
        id: "demo1", customer: "Martinez Concrete", jobSite: "Lot 14 — Bethany Ridge", soNumber: "SO-40821",
        lineItems: [
          { name: '24" Stakes', qty: 50, unit: "pcs" },
          { name: '18" Stakes', qty: 30, unit: "pcs" },
          { name: "Bag Ties", qty: 4, unit: "rolls" },
          { name: "Form Oil", qty: 2, unit: "pails" },
          { name: "Dobies", qty: 200, unit: "pcs" },
          { name: "#4 Rebar 20' Grade 60", qty: 25, unit: "pcs" }
        ], addedAt: Date.now()
      },
      {
        id: "demo2", customer: "Willamette Builders", jobSite: "Block 7 — River Terrace", soNumber: "SO-40835",
        lineItems: [
          { name: '24" Stakes', qty: 30, unit: "pcs" },
          { name: "Dobies", qty: 150, unit: "pcs" },
          { name: "Anchor Bolts 1/2\" x 10\"", qty: 40, unit: "pcs" },
          { name: "Form Clips", qty: 100, unit: "pcs" },
          { name: "Snap Ties 8\"", qty: 75, unit: "pcs" },
          { name: "Pier Papers 12\"", qty: 20, unit: "pcs" }
        ], addedAt: Date.now() + 1
      },
      {
        id: "demo3", customer: "JR Foundations", jobSite: "8824 SW Durham Rd", soNumber: "SO-40847",
        lineItems: [
          { name: "Bag Ties", qty: 2, unit: "rolls" },
          { name: "Form Oil", qty: 1, unit: "pails" },
          { name: '18" Stakes', qty: 20, unit: "pcs" },
          { name: "Snap Ties 8\"", qty: 50, unit: "pcs" },
          { name: "Flat Ties", qty: 30, unit: "pcs" }
        ], addedAt: Date.now() + 2
      }
    ];
    persistPullQueue(demoSOs);
    setCheckedItems({});
    setExpandedItems({});
  };
  const addSO = (so) => { persistPullQueue([...pullQueue, so]); setShowPullIntake(false); };
  const removeSO = (id) => { persistPullQueue(pullQueue.filter(s => s.id !== id)); };
  const clearPull = () => { persistPullQueue([]); setCheckedItems({}); setExpandedItems({}); setShowSOList(false); };

  const mergedPullItems = (() => {
    const map = {};
    for (const so of pullQueue) {
      for (const li of (so.lineItems || [])) {
        const key = normalizeForMatch(li.name);
        if (!key) continue;
        if (!map[key]) {
          map[key] = { name: li.name, totalQty: 0, unit: li.unit || "", sources: [] };
        }
        map[key].totalQty += (Number(li.qty) || 0);
        if (!map[key].unit && li.unit) map[key].unit = li.unit;
        map[key].sources.push({ soId: so.id, customer: so.customer, jobSite: so.jobSite, soNumber: so.soNumber, qty: Number(li.qty) || 0 });
      }
    }
    const items = Object.values(map);
    items.sort((a, b) => {
      const pa = matchPriority(a.name, pullPriority);
      const pb = matchPriority(b.name, pullPriority);
      if (pa !== pb) return pa - pb;
      return a.name.localeCompare(b.name);
    });
    return items;
  })();

  const pullCheckedCount = mergedPullItems.filter((_, i) => checkedItems[i]).length;
  const pullTotalCount = mergedPullItems.length;

  const toggleExpand = (idx) => setExpandedItems(prev => ({ ...prev, [idx]: !prev[idx] }));

  const grouped = (() => {

    return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
  })();
  const poCount = activeEntries.filter(e => e.type === "PO").length;
  const trCount = activeEntries.filter(e => e.type !== "PO").length;
  const upCount = activeUpcoming.length;
  const plCount = pullQueue.length;

    }}>

      {count > 0 && <span style={{ marginLeft: 4, fontSize: "0.62rem", color: tab === id ? (highlight || "#ffffff") : "#444444" }}>{count}</span>}
    </button>
  );

  const isPullTab = tab === "pull";

    <div style={{ minHeight: "100vh", background: "#0a0a0a", color: "#f5f5f5", fontFamily: "'Courier New', monospace", maxWidth: 660, margin: "0 auto" }}>
      <div style={{ borderBottom: "2px solid #ffffff", padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flex: "1 1 auto", minWidth: 0 }}>
          <div style={{ flexShrink: 0 }}>
            <div style={{ fontSize: "0.62rem", letterSpacing: "0.22em", color: "#555555", marginBottom: 1 }}>AURORA</div>
            <div style={{ fontSize: "1.25rem", fontWeight: 700, color: "#ffffff", letterSpacing: "0.06em", lineHeight: 1 }}>RECEIVING LOG</div>
          </div>
          <button onClick={() => setShowDict(true)} style={{ background: "none", border: "1px solid #2a2a2a", color: knownItems.length > 0 ? "#888888" : "#444444", padding: "6px 10px", fontFamily: "'Courier New',monospace", fontSize: "0.78rem", fontWeight: 700, cursor: "pointer" }}>
              DICT{knownItems.length > 0 && <span style={{ fontSize: "0.6rem", color: "#666666", marginLeft: 2 }}>{knownItems.length}</span>}
          </button>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
          {isPullTab ? (
            <React.Fragment>
              <button onClick={() => setShowPullIntake(s => !s)} style={{ background: showPullIntake ? "#141414" : "none", border: "1px solid " + (showPullIntake ? "rgba(91,143,255,0.5)" : "#2a2a2a"), color: showPullIntake ? "#5b8fff" : "#666666", padding: "6px 12px", fontFamily: "'Courier New',monospace", fontSize: "0.78rem", fontWeight: 700, cursor: "pointer" }}>{showPullIntake ? "HIDE" : "+ SO"}</button>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <button onClick={() => setShowIntake(s => !s)} style={{ background: showIntake ? "#141414" : "none", border: "1px solid " + (showIntake ? "rgba(255,255,255,0.33)" : "#2a2a2a"), color: showIntake ? "#ffffff" : "#666666", padding: "6px 12px", fontFamily: "'Courier New',monospace", fontSize: "0.78rem", fontWeight: 700, cursor: "pointer" }}>{showIntake ? "HIDE" : "SCAN"}</button>
              <button onClick={() => { setEditEntry(null); setEditMode(null); setShowAdd(true); }} style={{ background: "#ffffff", color: "#0a0a0a", border: "none", padding: "6px 12px", fontFamily: "'Courier New',monospace", fontSize: "0.78rem", fontWeight: 700, cursor: "pointer" }}>+ LOG</button>
            </React.Fragment>
          )}
        </div>
      </div>

      {dataLost && (
        <div style={{ background: "#2a1000", border: "1px solid #c9a84c", padding: "10px 14px" }}>
          <div style={{ color: "#c9a84c", fontWeight: 700, fontSize: "0.82rem", letterSpacing: "0.08em", marginBottom: 4 }}>DATA CORRUPTION DETECTED</div>
          <div style={{ color: "#999", fontSize: "0.76rem", lineHeight: 1.5, marginBottom: 8 }}>Both main and backup data were corrupted and could not be recovered. Corrupted data was saved to a recovery key.</div>
          <button onClick={() => setDataLost(false)} style={{ background: "none", border: "1px solid #3a3020", color: "#c9a84c", padding: "4px 12px", fontFamily: "'Courier New',monospace", fontSize: "0.72rem", cursor: "pointer" }}>DISMISS</button>
        </div>
      )}

      {showIntake && !isPullTab && <AIIntake onSave={addEntry} onSaveUpcoming={addUpcoming} knownItems={knownItems} />}
      {showPullIntake && isPullTab && <PullIntake onAddSO={addSO} knownItems={knownItems} />}

      <div style={{ borderBottom: "1px solid #1a1a1a", display: "flex" }}>
        {tabBtn("po", "POs", poCount)}
        {tabBtn("transfers", "XFERS", trCount)}
        {tabBtn("upcoming", "UPCOMING", upCount, "#c9a84c")}
        {tabBtn("pull", "PULL", plCount, "#5b8fff")}
      </div>

      <div style={{ padding: "0 12px 80px" }}>
        {!loaded ? (
          <div style={{ padding: 50, textAlign: "center", color: "#555555", fontSize: "0.84rem" }}>Loading...</div>
        ) : tab === "pull" ? (
          pullQueue.length === 0 ? (
            <div style={{ padding: 60, textAlign: "center" }}>
              <div style={{ color: "#2a2a2a", fontSize: "0.9rem", marginBottom: 12 }}>No sales orders loaded.</div>
              <div style={{ color: "#333333", fontSize: "0.74rem", marginBottom: 20 }}>Tap + SO to scan or enter a sales order.</div>
              <button onClick={loadDemoSOs} style={{ background: "none", border: "1px solid #1a1a2a", color: "#5b8fff", padding: "8px 16px", fontFamily: "'Courier New',monospace", fontSize: "0.76rem", fontWeight: 700, cursor: "pointer", letterSpacing: "0.06em" }}>LOAD DEMO</button>
            </div>
          ) : (
            <div>
              <div style={{ margin: "16px 0 8px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                  <span style={{ color: "#5b8fff", fontWeight: 700, fontSize: "0.82rem", letterSpacing: "0.06em" }}>
                    {pullCheckedCount} / {pullTotalCount}
                  </span>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => setShowSOList(s => !s)} style={{ background: "none", border: "1px solid #1a1a2a", color: "#5b8fff", padding: "3px 8px", fontFamily: "'Courier New',monospace", fontSize: "0.66rem", fontWeight: 700, cursor: "pointer" }}>
                      {pullQueue.length} SO{pullQueue.length !== 1 ? "s" : ""}
                    </button>
                    <button onClick={() => setShowPriority(true)} style={{ background: "none", border: "1px solid #2a2a2a", color: "#666666", padding: "3px 8px", fontFamily: "'Courier New',monospace", fontSize: "0.66rem", cursor: "pointer" }}>ORDER</button>
                    <button onClick={() => { if (confirm("Clear all SOs from pull sheet?")) clearPull(); }} style={{ background: "#1a0000", border: "1px solid #3a1010", color: "#aa4444", padding: "3px 8px", fontFamily: "'Courier New',monospace", fontSize: "0.66rem", fontWeight: 700, cursor: "pointer" }}>CLEAR</button>
                  </div>
                </div>
                <div style={{ height: 4, background: "#1a1a1a", width: "100%" }}>
                  <div style={{ height: 4, background: pullCheckedCount === pullTotalCount && pullTotalCount > 0 ? "#00c853" : "#5b8fff", width: pullTotalCount > 0 ? ((pullCheckedCount / pullTotalCount) * 100) + "%" : "0%", transition: "width 0.2s, background 0.2s" }} />
                </div>
              </div>

              {showSOList && (
                <div style={{ marginBottom: 12, padding: "8px 0" }}>
                  <div style={{ fontSize: "0.68rem", color: "#555555", letterSpacing: "0.1em", marginBottom: 6 }}>LOADED ORDERS</div>
                  {pullQueue.map(so => <PullSOCard key={so.id} so={so} onRemove={removeSO} />)}
                </div>
              )}

              {pullCheckedCount === pullTotalCount && pullTotalCount > 0 && (
                <div style={{ background: "#0a1a0a", border: "1px solid #1a3a1a", padding: "12px 14px", marginBottom: 10, textAlign: "center" }}>
                  <div style={{ color: "#00c853", fontWeight: 700, fontSize: "0.88rem", letterSpacing: "0.08em" }}>ALL ITEMS PULLED</div>
                  <div style={{ color: "#335533", fontSize: "0.72rem", marginTop: 4 }}>Tap CLEAR when orders are loaded out.</div>
                </div>
              )}
              {mergedPullItems.map((item, idx) => (
                <PullItemRow key={item.name} item={item} checked={!!checkedItems[idx]}
                  onToggle={() => toggleCheck(idx)} expanded={!!expandedItems[idx]}
                  onExpand={() => toggleExpand(idx)} />
              ))}
            </div>
          )
        ) : tab === "upcoming" ? (
          activeUpcoming.length === 0 ? (
            <div style={{ padding: 60, textAlign: "center", color: "#2a2a2a", fontSize: "0.9rem" }}>No upcoming orders staged.</div>
          ) : (
            activeUpcoming.map(entry => <UpcomingCard key={entry.id} entry={entry} onConfirm={confirmUpcoming} onDelete={deleteUpcoming} onEdit={handleEditUpcoming} />)
          )
        ) : grouped.length === 0 ? (
          <div style={{ padding: 60, textAlign: "center", color: "#2a2a2a", fontSize: "0.9rem" }}>{"No " + (tab === "po" ? "purchase orders" : "transfers") + " logged yet."}</div>
        ) : (
          grouped.map(([date, dayEntries]) => (
            <div key={date}>
              <DateHeader dateStr={date} />
              {dayEntries.map(entry => <EntryCard key={entry.id} entry={entry} onDelete={deleteEntry} onEdit={handleEdit} />)}
            </div>
          ))
        )}
      </div>

      <SyncStatusBar syncState={syncState} />

      {showAdd && <AddModal onClose={closeModal} onSave={editEntry ? handleSaveEdit : addEntry} onSaveUpcoming={addUpcoming} defaultType={tab === "po" ? "PO" : tab === "transfers" ? "Transfer In" : "PO"} editEntry={editEntry} editMode={editMode} knownItems={knownItems} />}
      {showApiKey && <ApiKeyModal onClose={() => setShowApiKey(false)} />}
      {showDict && <ItemDictModal onClose={() => setShowDict(false)} knownItems={knownItems} setKnownItems={setKnownItems} persistKnown={persistKnown} onOpenLabels={() => setShowLabels(true)} onOpenApiKey={() => setShowApiKey(true)} onOpenSync={() => setShowSyncToken(true)} />}
      {showLabels && <LabelMakerModal onClose={() => setShowLabels(false)} knownItems={knownItems} />}
      {showPriority && <PullPriorityModal onClose={() => setShowPriority(false)} priority={pullPriority} onSave={persistPullPriority} />}
      {showSyncToken && <SyncTokenModal onClose={() => setShowSyncToken(false)} onSaved={handleSyncSaved} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
